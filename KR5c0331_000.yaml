front:
  text: 巨勝歌并序
  hash: sha256:14d509b46e3de44cfed86aaea369763941e73d9f6b266629ca0e717c9411f951
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0331_HFL_000-001a, image: hfl/0597/0597-142.png}
body:
  text: 玄明子上清大洞逍士柳沖用陶真君三篇云以水銀為金丹者妄人言也朱砂可以駐年者不知道人也且水銀非五行正位朱砂非龍虎配合若以水銀為還丹之要可以耕石而植稻耳況抱朴子以二山之祕鉛汞之源曉諭丁寧迷者至死不悟混元經引五行相尅更為父母此蓋明乾坤之道金碧經云金土相配參同亦然引驗至明指示不昧且龍虎者隂陽之軸轄造化之樞機雖曰坎離實亦天地以剛伏柔從無入有五行節序各得其位在於配匹舉東合西一氣既分三才並列六爻遞設四象具陳然可伏鍊丹砂斯道玄微世人罕測只如參同云以金為隄防水入乃優遊金計有十五水數亦如之臨爐定銖兩五分水有餘其三遂不入水二興之俱此數句是大藥之綱紀如金水樞柄人皆不曉是道但穿尋巧譎自率胸襟無師執文終無得理誠所哀哉且古歌云始青之下月與日兩半同升合為一舉世不知此義但伏汞與砂不然則取朱砂中水銀多門燠伏變為煙燼何由還返不亦謬哉太易云二女同居其志不相得是即位而居也北方坎是隂返而歸陽南方離是陽伏而為隂日中之有烏月中之有蟾烏者陰精都歸其陽故曰生男不生女明矣大凡果實因亳末而生長而秀終得其實實之於樹樹亦不知是為自然太易圖云凡有隂陽即生人民禽獸草木若以水銀朱砂産於巴蜀其不出水銀朱砂處即不合有人民禽獸草木也以此方之不亦愚乎水銀朱砂有自然之者非世人可解千變萬化難窮乎理聖人多借金石以名之坎居七十二石之長何由之歌云不用雄兮自有黃是此義也若用水銀朱砂見火即飛何門可住縱伏火以為堅質本亦不存無生長還返之道那肯致焉又以霧散若風兩川流百脈即乖矣經云得一萬事畢又云得一莫執一杳杳冥冥其中有精恍恍惚惚其中有物玄之又玄體道之宗是各一二參及五行戊已之功歎鉛之美實難明解參同云有若漢經星百川流帶海舉世不可知之元君歌曰五內斤兩文葳蕤赤鹽白雪成雄雌真還在此人不知即應不用人間朱砂水銀乃知萬物因一氣而生三才因萬物所育又歌云一氣所失猶如瓦礫此論鼎內之事非外旨也余少親儒墨長學玄風偶因求瘼之餘近得長生之道雖盡彤襜之任有慙朱綬之榮輒以謏學將論大藥窮其精實究以玄微曾遇明師獲傳要妙固非謬妄演道賢良為巨勝歌十首其間歌詠鉛汞五行之妙後來學者用祛迷惑云爾其一九鼎何所自都因一氣生銀鉛看得所龍虎自吞并銖兩相旬制河車辨性情循還依節候還丹應可成其二龜蛇體殊異鉛汞共宗祖二女雖同居良媒分子母配合由三花青龍句白虎四象既可憑五神當有主其三巍巍尊復髙飄飄何左顧世人徒鍊丹不識神仙路衆石屬坎宫假名皆不悟黑白既不知流年亦虛度其四盡言水土金三物成大藥假氣遞相生相生復相爍黃芽不是鉛元向鉛中作舉東已合西戊巳為囊橐其五二八成兩家中弦敵二八乃知天地間隂陽制樞轄子因母而生母因子而殺長養嬰孩精溫顔防利滑月滿每成形抽添還暫歇壬子一陽生循環至亥絶若知出世期神符與白雪其六修真鍊形須守一參差一二爐間失且將壬子制裊蹄不然更泥扶桑日必令有味到無情方保元和夭性質不要他處覓良媒夫妻由來相配匹馬牙從此勝琅玕弦望晦朔候遲疾乃知東西定圓方世人莫謾誇竒術其七水母金父不易識化他流珠轉輝赩假氣若到白雪宮黃芽從兹實難測隄防堅固半浮沉姹女悲吟寧暫息其八古詩歌訣盡分明只是迷人強穿鑿至道猶來不甚煩妄將砂汞相交錯未知赤血與青腰終日只向鉛中作鉛中有物豈易修失之一氣無齗其九黃芽不是鉛二物生丹田若求巨勝法鉛汞須自然都非世間有不問愚與賢日魂與月華識者皆神仙其十太元道士本神仙移名中都學自然世人鍊藥迷金水燒盡黃芽不識鉛西蜀水銀人競採得火須臾變作煙若能得一莫執一妙法玄之又更玄巨勝歌
